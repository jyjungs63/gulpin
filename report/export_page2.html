<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>주문현황 엑셀 다운로드</title>
<style>
/* ════════════════════════════════════════════════
   리셋 & 기본
   ════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: '맑은 고딕', 'Malgun Gothic', sans-serif;
    font-size: 14px;
    background: #f0f2f5;
    color: #2d2d2d;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 16px;
}

/* ════════════════════════════════════════════════
   카드 컨테이너
   ════════════════════════════════════════════════ */
.card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
    width: 100%;
    max-width: 540px;
    padding: 36px 32px 32px;
    align-self: flex-start;
}

/* ── 타이틀 ── */
.card-title {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 4px;
}
.card-sub {
    font-size: 13px;
    color: #888;
    margin-bottom: 28px;
}

/* ════════════════════════════════════════════════
   폼 그룹
   ════════════════════════════════════════════════ */
.form-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    margin-bottom: 14px;
}
.form-group {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
}
.form-group label {
    font-size: 12px;
    font-weight: 600;
    color: #666;
    margin-bottom: 6px;
    letter-spacing: .3px;
}

/* ── 날짜 인풋 ── */
.form-group input[type="date"] {
    border: 1.5px solid #ddd;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: #333;
    background: #fafafa;
    transition: border-color .2s, box-shadow .2s;
    width: 100%;
}
.form-group input[type="date"]:focus {
    outline: none;
    border-color: #FFA63B;
    box-shadow: 0 0 0 3px rgba(255,166,59,.2);
    background: #fff;
}

/* ── 구분선 ── */
.sep {
    font-size: 18px;
    color: #bbb;
    padding-bottom: 6px;
    flex-shrink: 0;
}

/* ════════════════════════════════════════════════
   체크 옵션 (전체 조회)
   ════════════════════════════════════════════════ */
.check-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
}
.check-row input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #FFA63B;
    cursor: pointer;
}
.check-row label {
    font-size: 13px;
    color: #555;
    cursor: pointer;
    user-select: none;
}

/* ════════════════════════════════════════════════
   버튼
   ════════════════════════════════════════════════ */
.btn-export {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #FFA63B, #f08a1e);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    transition: filter .2s, transform .1s;
    margin-top: 4px;
}
.btn-export:hover  { filter: brightness(1.08); }
.btn-export:active { transform: scale(.975); }
.btn-export .icon  { font-size: 18px; }

/* ════════════════════════════════════════════════
   상태 메시지
   ════════════════════════════════════════════════ */
.msg {
    margin-top: 18px;
    font-size: 13px;
    text-align: center;
    min-height: 20px;
    border-radius: 6px;
    padding: 8px 12px;
    display: none;
}
.msg.success { display:block; background:#eafaf1; color:#2e7d4f; border:1px solid #c3e6cb; }
.msg.error   { display:block; background:#fef2f2; color:#b91c1c; border:1px solid #fecaca; }
.msg.info    { display:block; background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }

/* ════════════════════════════════════════════════
   테이블 미리보기
   ════════════════════════════════════════════════ */
.preview-wrap {
    margin-top: 28px;
    display: none;
}
.preview-title {
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 8px;
}
.preview-scroll {
    overflow-x: auto;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
}
table.preview {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    min-width: 620px;
}
table.preview thead th {
    background: #FFA63B;
    color: #fff;
    font-weight: 600;
    padding: 8px 6px;
    text-align: center;
    border-bottom: 2px solid #f08a1e;
    white-space: nowrap;
    position: sticky;
    top: 0;
}
table.preview tbody td {
    padding: 6px 8px;
    border-bottom: 1px solid #eee;
    text-align: left;
}
table.preview tbody tr:last-child td { border-bottom: none; }
table.preview tbody tr:hover td { background: #fff8f0; }
/* 숫자열 가운데 */
table.preview td.num { text-align: center; }
/* 빈 행 안내 */
table.preview .empty-row td {
    text-align: center;
    color: #999;
    padding: 16px;
}

/* ════════════════════════════════════════════════
   로딩 스피너
   ════════════════════════════════════════════════ */
.spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2.5px solid rgba(255,255,255,.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .5s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
    <!-- 타이틀 -->
    <h1 class="card-title">📦 주문현황 엑셀 다운로드</h1>
    <p class="card-sub">날짜 범위를 설정한 후 다운로드하거나, 전체를 조회할 수 있습니다.</p>

    <!-- 날짜 범위 -->
    <div class="form-row">
        <div class="form-group">
            <label>시작 날짜</label>
            <input type="date" id="fromDate">
        </div>
        <span class="sep">~</span>
        <div class="form-group">
            <label>종료 날짜</label>
            <input type="date" id="toDate">
        </div>
    </div>

    <!-- 전체 조회 체크 -->
    <div class="check-row">
        <input type="checkbox" id="chkAll">
        <label for="chkAll">날짜 필터 없이 전체 조회</label>
    </div>

    <!-- 미리보기 + 다운로드 버튼 -->
    <button class="btn-export" id="btnPreview" onclick="loadPreview()">
        <span class="icon">📋</span> 미리보기
    </button>

    <div class="msg" id="msg"></div>

    <!-- 미리보기 테이블 (동적 생성) -->
    <div class="preview-wrap" id="previewWrap">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
            <span class="preview-title">📄 미리보기</span>
            <button class="btn-export" style="width:auto; padding:8px 18px; font-size:13px;" id="btnDownload" onclick="downloadExcel()">
                <span class="icon">⬇️</span> 엑셀 다운로드
            </button>
        </div>
        <div class="preview-scroll">
            <table class="preview" id="previewTable">
                <thead>
                    <tr>
                        <th>날짜</th><th>지사명</th><th>유치원명</th>
                        <th>0단계</th><th>수량</th>
                        <th>A단계</th><th>수량</th>
                        <th>B단계</th><th>수량</th>
                        <th>합계금액</th><th>입금완료</th>
                        <th>송장번호</th><th>출고날짜</th>
                        <th>반품</th><th>비고</th>
                    </tr>
                </thead>
                <tbody id="previewBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// 날짜 기본값 (오늘 기준 현재월 1일 ~ 월말)
// ═══════════════════════════════════════════════════════
(function initDates() {
    const now  = new Date();
    const y    = now.getFullYear();
    const m    = now.getMonth();                           // 0-indexed
    const from = new Date(y, m, 1);
    const to   = new Date(y, m + 1, 0);                   // 현재월 마지막날

    document.getElementById('fromDate').value = fmt(from);
    document.getElementById('toDate').value   = fmt(to);
})();

function fmt(d) {
    return d.getFullYear() + '-'
         + String(d.getMonth() + 1).padStart(2,'0') + '-'
         + String(d.getDate()).padStart(2,'0');
}

// ═══════════════════════════════════════════════════════
// 체크 토글 시 날짜 인풋 비활성화
// ═══════════════════════════════════════════════════════
document.getElementById('chkAll').addEventListener('change', function() {
    const off = this.checked;
    document.getElementById('fromDate').disabled = off;
    document.getElementById('toDate').disabled   = off;
});

// ═══════════════════════════════════════════════════════
// 상태 메시지 표시
// ═══════════════════════════════════════════════════════
function showMsg(text, type) {          // type : success | error | info
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className   = 'msg ' + type;
}
function hideMsg() {
    const el = document.getElementById('msg');
    el.className = 'msg';
}

// ═══════════════════════════════════════════════════════
// URL 파라미터 생성
// ═══════════════════════════════════════════════════════
function buildParams() {
    const all  = document.getElementById('chkAll').checked;
    const from = document.getElementById('fromDate').value;
    const to   = document.getElementById('toDate').value;

    if (all) return '?all=1';

    if (!from && !to) { showMsg('날짜를 최소 하나 입력하거나 "전체 조회"를 체크해주세요.', 'error'); return null; }
    if (from && to && from > to) { showMsg('종료 날짜가 시작 날짜보다 앞서 있습니다.', 'error'); return null; }

    const p = new URLSearchParams();
    if (from) p.set('from', from);
    if (to)   p.set('to',   to);
    return '?' + p.toString();
}

// ═══════════════════════════════════════════════════════
// 미리보기 (AJAX → preview_excel.php)
// ─────────────────────────────────────────────────────
// preview_excel.php는 같은 로직으로 JSON을 반환하는 엔드포인트
// 아래 주석 참고하여 별도 구현하거나, 없으면 미리보기를 건너뛸 수 있음
// ═══════════════════════════════════════════════════════
async function loadPreview() {
    const params = buildParams();
    if (params === null) return;

    hideMsg();
    const btn = document.getElementById('btnPreview');
    btn.innerHTML = '<span class="spinner"></span> 로딩…';
    btn.disabled  = true;

    try {
        const res  = await fetch('preview_excel.php' + params);
        const text = await res.text();

        let data;
        try {
            data = JSON.parse(text);
        } catch (e) {
            // JSON 파싱 실패 → 서버에서 반환한 원본 텍스트 표시
            showMsg('서버 응답 오류: ' + text.substring(0, 200), 'error');
            return;
        }

        renderTable(data);
        showMsg(`총 ${data.length}건의 주문 데이터를 조회했습니다.`, 'success');
    } catch (e) {
        showMsg('미리보기 로드 실패: ' + e.message, 'error');
    } finally {
        btn.innerHTML = '<span class="icon">📋</span> 미리보기';
        btn.disabled  = false;
    }
}

// ═══════════════════════════════════════════════════════
// 테이블 렌더링
// ═══════════════════════════════════════════════════════
function renderTable(rows) {
    const tbody = document.getElementById('previewBody');
    tbody.innerHTML = '';

    if (!rows || rows.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="15">조회된 데이터가 없습니다.</td></tr>';
        document.getElementById('previewWrap').style.display = 'block';
        return;
    }

    rows.forEach(r => {
        const cols = [
            r.date      || '',
            r.addr      || '',
            r.order     || '',
            r.title_0   || '',   // 0단계 title
            r.count_0   || '',   // 0단계 수량
            r.title_A   || '',
            r.count_A   || '',
            r.title_B   || '',
            r.count_B   || '',
            r.total     || '',   // 합계금액
            r.confirm_date || '',
            r.invoice   || '',
            r.out_date  || '',
            r.refund    || '',
            ''                   // 비고
        ];
        const numIdx = [4,6,8,9];  // 수량·금액 열 인덱스 (0부터)

        tbody.insertAdjacentHTML('beforeend',
            '<tr>' +
            cols.map((v, i) =>
                '<td class="' + (numIdx.includes(i) ? 'num' : '') + '">' +
                (numIdx.includes(i) && v !== '' ? Number(v).toLocaleString() : v) +
                '</td>'
            ).join('') +
            '</tr>'
        );
    });

    document.getElementById('previewWrap').style.display = 'block';
}

// ═══════════════════════════════════════════════════════
// 엑셀 다운로드 (export_excel.php)
// ═══════════════════════════════════════════════════════
function downloadExcel() {
    const params = buildParams();
    if (params === null) return;

    hideMsg();
    showMsg('엑셀 파일 생성 중…', 'info');

    // <a> 태그로 파일 다운로드 트리거
    const a       = document.createElement('a');
    a.href        = 'export_excel.php' + params;
    a.download    = '';                        // 서버에서 Content-Disposition 처리
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    setTimeout(() => showMsg('엑셀 파일 다운로드가 시작되었습니다.', 'success'), 1200);
}
</script>
</body>
</html>
